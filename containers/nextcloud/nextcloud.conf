# Apache vhost for Nextcloud on RHEL9/UBI9
# Uses php-fpm via mod_proxy_fcgi (RHEL9 does not ship mod_php)

# Proxy all PHP requests to php-fpm via Unix socket
<FilesMatch \.php$>
    SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
</FilesMatch>

# Set index files
DirectoryIndex index.php index.html

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options +FollowSymlinks
        AllowOverride All
        Require all granted

        <IfModule mod_dav.c>
            Dav off
        </IfModule>

        SetEnv HOME /var/www/html
        SetEnv HTTP_HOME /var/www/html
    </Directory>

    # Container-friendly logging
    ErrorLog /dev/stderr
    TransferLog /dev/stdout
</VirtualHost>
