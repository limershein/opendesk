---
# Production OpenDesk deployment for podman kube play
# Uses external databases and services
# Services: Nextcloud with external PostgreSQL, Redis, and S3

apiVersion: v1
kind: Pod
metadata:
  name: opendesk-production
  labels:
    app: opendesk
    env: production
spec:
  hostNetwork: false

  containers:
  # Nextcloud File Management
  - name: nextcloud
    image: localhost/opendesk-nextcloud:latest
    env:
    # External PostgreSQL Configuration
    # Replace these values with your external database credentials
    - name: POSTGRES_HOST
      value: "EXTERNAL_POSTGRES_HOST"
    - name: POSTGRES_DB
      value: "nextcloud"
    - name: POSTGRES_USER
      value: "EXTERNAL_POSTGRES_USER"
    - name: POSTGRES_PASSWORD
      value: "EXTERNAL_POSTGRES_PASSWORD"

    # External Redis Configuration
    # Replace with your external Redis host
    - name: REDIS_HOST
      value: "EXTERNAL_REDIS_HOST"
    - name: REDIS_HOST_PORT
      value: "6379"
    - name: REDIS_HOST_PASSWORD
      value: "EXTERNAL_REDIS_PASSWORD"

    # Nextcloud Configuration
    - name: NEXTCLOUD_TRUSTED_DOMAINS
      value: "files.your-domain.com"
    - name: NEXTCLOUD_ADMIN_USER
      value: "admin"
    - name: NEXTCLOUD_ADMIN_PASSWORD
      value: "CHANGE_ME_ADMIN_PASSWORD"
    - name: OVERWRITEPROTOCOL
      value: "https"

    # External S3/Object Storage Configuration
    # Replace with your S3-compatible storage credentials
    - name: OBJECTSTORE_S3_BUCKET
      value: "nextcloud"
    - name: OBJECTSTORE_S3_AUTOCREATE
      value: "true"
    - name: OBJECTSTORE_S3_KEY
      value: "EXTERNAL_S3_ACCESS_KEY"
    - name: OBJECTSTORE_S3_SECRET
      value: "EXTERNAL_S3_SECRET_KEY"
    - name: OBJECTSTORE_S3_HOST
      value: "EXTERNAL_S3_HOST"
    - name: OBJECTSTORE_S3_PORT
      value: "443"
    - name: OBJECTSTORE_S3_SSL
      value: "true"
    - name: OBJECTSTORE_S3_REGION
      value: "us-east-1"
    - name: OBJECTSTORE_S3_USEPATH_STYLE
      value: "false"

    # PHP Configuration for production
    - name: PHP_MEMORY_LIMIT
      value: "512M"
    - name: PHP_UPLOAD_LIMIT
      value: "10G"

    ports:
    - containerPort: 80
      hostPort: 8080

    volumeMounts:
    - name: nextcloud-data
      mountPath: /var/www/html

    # Resource limits (adjust based on your needs)
    # Note: Podman kube play has limited support for resources
    # These may need to be configured via podman CLI flags

  volumes:
  - name: nextcloud-data
    hostPath:
      path: /var/opendesk/nextcloud
      type: DirectoryOrCreate

---
# ConfigMap for production environment variables
# Store this separately and load via Secret or external configuration management
apiVersion: v1
kind: ConfigMap
metadata:
  name: opendesk-production-config
data:
  # Database Configuration
  db_host: "EXTERNAL_POSTGRES_HOST"
  db_port: "5432"
  db_name: "nextcloud"

  # Redis Configuration
  redis_host: "EXTERNAL_REDIS_HOST"
  redis_port: "6379"

  # S3 Configuration
  s3_endpoint: "EXTERNAL_S3_HOST"
  s3_region: "us-east-1"
  s3_bucket: "nextcloud"
