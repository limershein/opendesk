# systemd tmpfiles.d configuration for OpenDesk storage
# This creates and sets ownership of storage directories at boot

# Create directories with proper ownership
# Format: Type Path Mode UID GID Age Argument
d /var/opendesk 0755 root root -
d /var/opendesk/postgres 0755 26 26 -
d /var/opendesk/redis 0755 1001 0 -
d /var/opendesk/minio 0755 root root -
d /var/opendesk/nextcloud 0755 48 48 -

# Set SELinux context for container storage
# Format: z Path Mode UID GID Age Argument
z /var/opendesk - - - - - container_file_t
z /var/opendesk/postgres - - - - - container_file_t
z /var/opendesk/redis - - - - - container_file_t
z /var/opendesk/minio - - - - - container_file_t
z /var/opendesk/nextcloud - - - - - container_file_t
